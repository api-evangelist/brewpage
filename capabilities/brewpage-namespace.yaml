naftiko: 1.0.0-alpha2
info:
  label: BrewPage API — Namespace
  description: 'BrewPage API — Namespace. 1 operations. Lead operation: BrewPage Suggest a Random Namespace. Self-contained
    Naftiko capability covering one Brewpage business surface.'
  tags:
  - Brewpage
  - Namespace
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    BREWPAGE_API_KEY: BREWPAGE_API_KEY
capability:
  consumes:
  - type: http
    namespace: brewpage-namespace
    baseUri: https://brewpage.app
    description: BrewPage API — Namespace business capability. Self-contained, no shared references.
    resources:
    - name: api-namespace-random
      path: /api/namespace/random
      operations:
      - name: random
        method: GET
        description: BrewPage Suggest a Random Namespace
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: brewpage-namespace-rest
    port: 8080
    description: REST adapter for BrewPage API — Namespace. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/api/namespace/random
      name: api-namespace-random
      description: REST surface for api-namespace-random.
      operations:
      - method: GET
        name: random
        description: BrewPage Suggest a Random Namespace
        call: brewpage-namespace.random
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: brewpage-namespace-mcp
    port: 9090
    transport: http
    description: MCP adapter for BrewPage API — Namespace. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: brewpage-suggest-random-namespace
      description: BrewPage Suggest a Random Namespace
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: brewpage-namespace.random
      outputParameters:
      - type: object
        mapping: $.
